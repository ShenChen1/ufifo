name: Release

on:
  push:
    tags:
      - 'v*' # Trigger on tag push, e.g., v1.0.0

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release for ${{ matrix.artifact_arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            artifact_arch: x86_64
            target: ""
            packages: ""
          - arch: aarch64
            artifact_arch: arm64
            target: "aarch64-linux-gnu"
            packages: "gcc-aarch64-linux-gnu g++-aarch64-linux-gnu binutils-aarch64-linux-gnu libc6-dev-arm64-cross"
          - arch: armhf
            artifact_arch: arm
            target: "arm-linux-gnueabihf"
            packages: "gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf binutils-arm-linux-gnueabihf libc6-dev-armhf-cross"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake binutils ${{ matrix.packages }}

      - name: Configure CMake
        run: |
          CMAKE_FLAGS="-DUFIFO_SEPARATE_DBGINFO=ON"
          if [ -n "${{ matrix.target }}" ]; then
            CMAKE_FLAGS="$CMAKE_FLAGS -DCMAKE_TOOLCHAIN_FILE=cmake/toolchains/${{ matrix.target }}.cmake"
          fi
          cmake -B build $CMAKE_FLAGS

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Package artifacts
        run: |
          cd build
          cpack -G TGZ
          cd ..
          
          # Rename CPack generated artifacts to match the expected release asset names
          mv build/ufifo-*-release.tar.gz ufifo-${{ github.ref_name }}-linux-${{ matrix.artifact_arch }}.tar.gz
          mv build/ufifo-*-dbgsym.tar.gz ufifo-${{ github.ref_name }}-linux-${{ matrix.artifact_arch }}-dbgsym.tar.gz

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ufifo-${{ github.ref_name }}-linux-${{ matrix.artifact_arch }}.tar.gz
            ufifo-${{ github.ref_name }}-linux-${{ matrix.artifact_arch }}-dbgsym.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false

  release-docs:
    name: Build and Release API Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake doxygen

      - name: Configure CMake
        run: cmake -B build

      - name: Build Documentation
        run: cmake --build build --target doc

      - name: Package Documentation
        run: tar -czvf ufifo-${{ github.ref_name }}-api-docs.tar.gz -C build/docs/html .

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ufifo-${{ github.ref_name }}-api-docs.tar.gz
