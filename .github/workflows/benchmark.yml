name: Performance Benchmark

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: write
  deployments: write
  pull-requests: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build benchmark
        run: |
          cmake -B build
          cmake --build build --target ufifo_bench -j$(nproc)

      - name: Run benchmark
        run: ./build/bin/ufifo_bench 1 --json > benchmark-result.json

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: ufifo Performance Benchmark
          tool: 'customBiggerIsBetter'
          output-file-path: benchmark-result.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
          # Show alert with commit comment on detecting possible performance regression
          alert-threshold: '120%'
          comment-on-alert: true
          fail-on-alert: true
